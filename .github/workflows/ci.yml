name: "🖼️ CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: "🏗️ Build"
        run: go build ./...

      - name: "🔍 Vet"
        run: go vet ./...

      - name: "🧹 gofmt check"
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi
